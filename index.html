<title>Stone Brand Identity Guidelines</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffffff;
  font-family: Arial, sans-serif;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.book {
  position: relative;
  width: 90vw;
  max-width: 1056px;
  aspect-ratio: 11 / 8.5;
  perspective: 2500px;
}

.page {
  position: absolute;
  width: 100%;
  height: 100%;
  transform-origin: left;
  transform-style: preserve-3d;
  transition: transform 1s ease;
  cursor: pointer;
  box-shadow: 0 5px 5px rgba(0,0,0,0.2);
}

.page .front,
.page .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.page .front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.page .back {
  background: black;
  transform: rotateY(180deg);
}

.page:last-child .back {
  background: white;
}

.page.flipped {
  transform: rotateY(-180deg);
}

.controls {
  margin-top: 20px;
  width: 90vw;
  max-width: 1056px;
  display: flex;
  justify-content: space-between;
}

button {
  padding: 10px 20px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #444;
}

@media (max-width: 600px) {
  button {
    font-size: 14px;
    padding: 8px 14px;
  }
}
</style>
</head>

<script>
const pages = document.querySelectorAll(".page");
let current = 0;
let isFlipping = false;

pages.forEach((page, index) => {
  page.style.zIndex = pages.length - index;
});

function nextPage() {
  if (current < pages.length - 1 && !isFlipping) {
    isFlipping = true;
    pages[current].classList.add("flipped");
    current++;
    setTimeout(() => isFlipping = false, 1000);
  }
}

function prevPage() {
  if (current > 0 && !isFlipping) {
    isFlipping = true;
    current--;
    pages[current].classList.remove("flipped");
    setTimeout(() => isFlipping = false, 1000);
  }
}

document.getElementById("book").addEventListener("click", function(e) {
  const rect = this.getBoundingClientRect();
  const clickX = e.clientX - rect.left;

  if (clickX > rect.width / 2) {
    nextPage();
  } else {
    prevPage();
  }
});

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight") nextPage();
  if (e.key === "ArrowLeft") prevPage();
});
</script>
